name: Release

on:
  push:
    branches:
      - acc

jobs:
  deploy:
    concurrency:
      group: ${{ github.ref_name }}
    secrets: inherit
    permissions:
      issues: write
      contents: read
      pull-requests: write
      actions: read
    uses: guidion-digital/terrappy/.github/workflows/tfc-test-application-modules-apply-enterprise.yaml@v1
    with:
      tfc_workspace: constr-acc-helper-cf-s3-app-x

  # Merges acc into master because a non Terraform code change has been made.
  workflow-change:
    if: ${{ needs.deploy.outputs.terraform-deploy-result != 'success' && needs.deploy.outputs.terraform-file-changes-result == 'false' }}
    needs: deploy
    uses: guidion-digital/release-workflows/.github/workflows/github-merge-into-master.yaml@v2
    with:
      branch: ${{ github.ref_name }}
    permissions:
      contents: write

  # Merges acc into master and release new tag for the module because a change to Terraform code has been made.
  terraform-module-change:
    if: ${{ needs.deploy.outputs.terraform-deploy-result == 'success' }}
    needs: deploy
    uses: guidion-digital/release-workflows/.github/workflows/github-merge-into-master.yaml@v2
    with:
      branch: ${{ github.ref_name }}
    permissions:
      contents: write

  release-module-version:
    if: ${{ needs.deploy.outputs.terraform-deploy-result == 'success' }}
    needs: [deploy, terraform-module-change]
    uses: guidion-digital/release-workflows/.github/workflows/github-release-tag.yaml@v2
    with:
      branch: ${{ github.ref_name }}
    permissions:
      contents: write
